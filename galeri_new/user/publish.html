<style>
    /* SECTION */
.gbj-section {
  font-family: 'Georgia', serif;
}

/* LEFT */
.left-side {
  height: 100vh;
  overflow: hidden;
}

.img-cover {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RIGHT */
.right-side {
  background: #efefef;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* CONTENT */
.content-wrapper {
  width: 75%;
  text-align: center;
}

/* TITLE */
.title {
  font-size: 42px;
  color: #8b4a2f;
  font-weight: 600;
  margin-bottom: 15px;
}

/* LINE */
.divider {
  width: 100%;
  height: 1px;
  background: #999;
  margin-bottom: 50px;
}

/* LOGO GRID */
.logo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 60px 40px;
  align-items: center;
  justify-items: center;
}

.logo-grid img {
  max-width: 140px;
  object-fit: contain;
}

/* HAMBURGER */
.menu-icon {
  position: absolute;
  top: 30px;
  right: 40px;
  width: 30px;
  cursor: pointer;
}

.menu-icon span {
  display: block;
  height: 3px;
  background: #333;
  margin: 6px 0;
  border-radius: 3px;
}

/* SIDE COLOR BAR */
.side-bar {
  position: absolute;
  top: 0;
  right: 0;
  width: 18px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.bar-top {
  flex: 1;
  background: #8b4a2f;
}

.bar-bottom {
  flex: 1;
  background: #6f8f7c;
}
</style>
<section class="gbj-section container-fluid p-0">
    <div class="global-menu">
        <span></span>
        <span></span>
        <span></span>
    </div>
  <div class="row g-0 vh-100">
    <!-- LEFT IMAGE -->
    <div class="col-md-6 left-side">
      <img src="img/buku.jpeg" class="img-cover" alt="Book Image">
    </div>

    <!-- RIGHT CONTENT -->
    <div class="col-md-6 right-side position-relative">

      <div class="content-wrapper">
        <h1 class="title">GBJ Publishing Group</h1>
        <div class="divider"></div>

        <div class="logo-grid">
          <!-- Row 1 -->
          <img src="img/ace.png" alt="">
          <img src="img/ace.png" alt="">
          <img src="img/ace.png" alt="">

          <!-- Row 2 -->
          <img src="img/ace.png" alt="">
          <img src="img/ace.png" alt="">
          <img src="img/ace.png" alt="">

          <!-- Row 3 -->
          <img src="img/ace.png" alt="">
          <img src="img/ace.png" alt="">
          <img src="img/ace.png" alt="">
        </div>
      </div>

      <!-- Right Color Bar -->
      <div class="side-bar">
        <div class="bar-top"></div>
        <div class="bar-bottom"></div>
      </div>

    </div>

  </div>
</section>
